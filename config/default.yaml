# =============================================================================
# The excitement index — the method as data.
#
# Everything a user might reasonably want to change lives here:
#   * which measures belong to which sub-family (the taxonomy)
#   * the sub-family weights (they sum to 1)
#   * which measures count AGAINST excitement (signs)
#   * which measures skip z-scoring (bounded 0/1 flags)
#   * the two context deductions ("taxes") and their parameters
#   * the display buckets and the 0-10 publication-scale defaults
#
# To experiment: copy this file, edit, and pass its path (or a dict of
# overrides) to `score_matches(..., config=...)`. To add a brand-new measure,
# write one decorated function (see excitement_index/measures/registry.py) and
# list its name under a family here.
#
# The values below are the frozen constants used for the published
# World Cup 2026 board (weights selected by pre-registered constrained search
# over 20,016 candidates — see README §"How the weights were chosen").
# =============================================================================

# --- taxonomy: sub-family -> ordered list of measure names -------------------
taxonomy:
  prematch:    [neg_ranking_gap, prematch_openness]
  stakes:      [knockout, elimination_stakes, host_nation]
  backforth:   [gei, suspense, peak_tension, lead_changes, comeback_magnitude,
                xg_lead_changes, time_within_one_goal]
  brilliance:  [take_ons, long_carries, line_breaking_passes, directness,
                screamer_goals, individual_takeover]
  chances:     [total_npxg, total_shots, total_sot, big_chances, box_entries,
                chance_leverage_total, chance_leverage_p95, shot_balance]
  keeping:     [keeper_saves, psxg_minus_goals, great_saves, one_on_ones, goal_line_peril]
  upset:       [upset, shock, underdog_defiance]
  timing:      [late_goals, late_winner, goal_burstiness, big_chance_xg_missed,
                leverage_missed_late, peak_window_tv, late_window_tv]
  resolution:  [resolution_leverage, total_goals, shootout_drama]
  flow:        [tempo, end_to_end, bip_share, counter_shots, counterpress,
                ball_recoveries, obv_end_to_end, obv_peak, obv_flat_share, dead_air]
  controversy: [cards, red_card, penalties]

# --- sub-family weights (frozen; full precision; sum = 1) --------------------
weights:
  prematch:    0.0475206772553563
  stakes:      0.1566518572270068
  backforth:   0.0981310636369297
  brilliance:  0.0836846948996013
  chances:     0.1392209793408524
  keeping:     0.0660524208110591
  upset:       0.0388178213742232
  timing:      0.1005942548741052
  resolution:  0.1239819188599194
  flow:        0.1151236939826554
  controversy: 0.0302206177382906

# --- measures that count AGAINST excitement (sign = -1) ----------------------
negative_signs: [obv_flat_share, dead_air, cards, red_card]

# --- bounded 0/1 flags that enter at fixed scale instead of a z-score --------
# (a binary with near-zero variance in the reference pool z-scores absurdly;
#  value = raw flag x scale)
fixed_scale:
  host_nation: 1.0

# --- display buckets: bucket -> sub-families (regrouping only; score-neutral)
# Both taxes are folded into the "stakes" bucket for display.
buckets:
  stakes:      [prematch, stakes, upset]
  chances:     [chances, keeping]
  drama:       [backforth, timing]
  spectacle:   [brilliance, flow, controversy]
  payoff:      [resolution]

# --- the two context deductions ----------------------------------------------
taxes:
  # Dead-rubber tax: a match keeps 1 - k*(1 - jeopardy) of its POSITIVE quality
  # score; knockout matches have jeopardy 1 and pay nothing.
  dead_rubber_k: 0.40
  # Aliveness tax (knockouts only): delta * (1 - aliveness), floored so no
  # match is pushed below the reference-pool median raw score.
  aliveness_delta: 0.60

# --- host nations (the bounded host flag + the Elo home-field edge) ----------
host_nations: [United States, USA, Mexico, Canada]
host_elo_edge: 50.0

# --- 0-10 publication scale ----------------------------------------------------
# Seven quantile anchors: x = raw-score quantiles of YOUR reference pool
# (computed at fit time), y = the target display distribution at the same
# quantiles. The default y-anchors reproduce the fan-scale calibration of the
# published index (aggregate crowd-rating quantiles, seriesgraph.com, n=92
# well-voted WC2026 matches). Above/below the outer anchors the map approaches
# 10 and 0 exponentially; neither endpoint is attainable.
scale:
  anchor_percentiles: [0.02, 0.10, 0.30, 0.50, 0.70, 0.90, 0.98]
  anchor_display_values: [5.30, 6.30, 7.10, 7.40, 7.77, 8.59, 9.336]
  top_pin_rating: 9.49        # the pool's 2nd-highest raw publishes exactly this
  round_decimals: 2
